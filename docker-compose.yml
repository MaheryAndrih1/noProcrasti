services:
  flutter:
    build: .
    container_name: noprocrasti_flutter
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
    command: flutter test

  app:
    build: .
    container_name: noprocrasti_app
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
    command: flutter run -d web-server --web-hostname=0.0.0.0 --web-port=3000
    ports:
      - "3000:3000"
